[advisories]
# Deny known security vulnerabilities.
version = 2
yanked = "deny"
ignore = [
    # RUSTSEC-2025-0020: pyo3 0.21.2 — PyString::from_object buffer overflow
    # ZPyFlow does NOT call PyString::from_object anywhere in src/.
    # All string construction goes through PyString::new_bound.
    # Accepting known risk: the vulnerable code path is never reached.
    "RUSTSEC-2025-0020",
]

[licenses]
# Allow common permissive and copyleft licenses used by the dependency tree.
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
]
unused-allowed-license = "allow"

[bans]
# Warn (not deny) on duplicate dependencies — some are unavoidable in the PyO3 tree.
multiple-versions = "warn"

[sources]
# Only allow crates.io as a source.
unknown-registry = "deny"
unknown-git = "deny"
