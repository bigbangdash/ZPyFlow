# NOTE: Do NOT add -framework Python here.
# maturin reads this file and applies rustflags to ALL targets including cdylib.
# Adding -framework Python causes Python to be double-linked in the extension module → crash.
#
# For `cargo test --lib`, pass the flag via env var instead:
#   CARGO_TARGET_AARCH64_APPLE_DARWIN_RUSTFLAGS="-C link-arg=-F/Library/Frameworks -C link-arg=-framework -C link-arg=Python" cargo test --lib
