name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:  # 手動実行を許可

permissions:
  contents: read

jobs:
  # ── Rust unit tests (always) ───────────────────────────────────────────────
  rust-test:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  # ── Dependency audit (always) ──────────────────────────────────────────────
  cargo-deny:
    name: cargo-deny audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check advisories

  # ── Miri UB checks — main push only (slow, uses nightly) ──────────────────
  miri:
    name: Miri UB check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
        with:
          key: miri-nightly
      - name: Run Miri on pure-Rust pipeline tests
        run: cargo +nightly miri test --lib -- pipeline simd
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"

  # ── Python integration tests ───────────────────────────────────────────────
  pytest:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # PR: Linux py3.11 のみ（速い）
          - os: ubuntu-latest
            python-version: "3.11"
            full: false
          # main push 追加分: 複数バージョン・macOS
          - os: ubuntu-latest
            python-version: "3.10"
            full: true
          - os: ubuntu-latest
            python-version: "3.12"
            full: true
          - os: macos-latest
            python-version: "3.11"
            full: true
          - os: windows-latest
            python-version: "3.11"
            full: true
    # main push: 全マトリクス / PR: full=false のみ
    if: github.ref == 'refs/heads/main' || matrix.full == false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install maturin numpy pyarrow pytest
      - name: Build and install extension
        run: |
          maturin build --release
          pip install --find-links target/wheels zpyflow
      - name: Run tests
        run: pytest tests/ -v
