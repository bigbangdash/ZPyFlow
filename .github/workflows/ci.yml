name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "site/**"
      - "**.md"
      - "mkdocs.yml"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "site/**"
      - "**.md"
      - "mkdocs.yml"
  workflow_dispatch:
    inputs:
      run_quick:
        description: "pytest-quick (Linux py3.11)"
        type: boolean
        default: true
      run_full:
        description: "pytest-full (full matrix)"
        type: boolean
        default: false
      run_miri:
        description: "Miri UB check"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ── Rust unit tests (always) ───────────────────────────────────────────────
  rust-test:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib

  # ── Dependency audit (always) ──────────────────────────────────────────────
  cargo-deny:
    name: cargo-deny audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

  # ── Miri UB checks — main push only (slow, uses nightly) ──────────────────
  miri:
    name: Miri UB check
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_miri == true)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
        with:
          key: miri-nightly
      - name: Run Miri on pure-Rust pipeline tests
        run: cargo +nightly miri test --lib -- pipeline simd
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"

  # ── Python tests: PR / push — Linux py3.11 のみ（速い）─────────────────────
  pytest-quick:
    name: pytest (ubuntu / py3.11)
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.run_quick == true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install maturin numpy pyarrow pytest pytest-benchmark
      - name: Build and install extension
        run: |
          maturin build --release
          pip install --find-links target/wheels zpyflow
      - name: Run tests
        run: pytest tests/ -v

  # ── Python tests: main push のみ — フルマトリクス ─────────────────────────
  pytest-full:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    if: |
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_full == true)
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.11"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install maturin numpy pyarrow pytest pytest-benchmark
      - name: Build and install extension
        run: |
          maturin build --release
          pip install --find-links target/wheels zpyflow
      - name: Run tests
        run: pytest tests/ -v
